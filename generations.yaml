generations:
  - name: "First Generation (G07)"
    start_year: 2018
    end_year: 2022
    description: "The BMW X7 is the brand's first full-size, three-row luxury SUV, positioned above the X5 as BMW's flagship SUV model. Built on the CLAR platform, it features imposing dimensions with a length of over 5 meters and a distinctive design characterized by a massive kidney grille, slim vertical headlights, and an upright, boxy profile to maximize interior space. Production started in December 2018 at the BMW US Manufacturing Company plant in Greer, South Carolina, with the X7 becoming available at dealers in March 2019. The interior offers premium appointments with three rows of seats as standard (either in seven-seat configuration or six-seat with second-row captain's chairs), advanced technology including BMW's iDrive 7.0 system, and a dual-panel panoramic sunroof. Engine options vary by market, including six and eight-cylinder petrol and diesel options. All models come standard with air suspension, all-wheel drive (xDrive), and an eight-speed automatic transmission."
  - name: "First Generation (G07) Facelift"
    start_year: 2023
    end_year: null
    description: "The 2022 facelift of the BMW X7 entered production in July 2022 and was launched in August 2022, with model year 2023 marking the introduction of the updated design. The major exterior changes include heavily revised front end design with new horizontally split headlight units (increasing the proportion of the front dedicated to headlights) and an illuminated kidney grille. The interior features a revised curved widescreen dashboard combining digital instruments and infotainment running BMW's latest Operating System 8. A significant mechanical change is that all models from 2023 onwards feature mild hybrid (MHEV) powertrain technology. The updated design is described as very similar to the original first generation design with minimal changes to the side profile and rear, but with a distinctive new face that aligns with BMW's design language seen on the newer 7 Series and i7 models."
